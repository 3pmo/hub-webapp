name: Deploy to Firebase Hosting and Functions

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Application
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        run: |
          echo "{\"last_sync\": \"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"}" > src/assets/sync-meta.json
          npm ci
          npm run build

      - name: Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npm install --prefix functions
          npm install -g firebase-tools
          firebase deploy --only hosting,functions,database --project hub-3pmo --token "$FIREBASE_TOKEN" --force
